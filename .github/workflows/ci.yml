name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - dotnet: "8.0.x"
            tfm: "net8.0"
            # Bridge mode (TestingPlatformDotnetTestSupport): MTP args go after --
            mtp_sep: "--"
          - dotnet: "9.0.x"
            tfm: "net9.0"
            mtp_sep: "--"
          - dotnet: "10.0.x"
            tfm: "net10.0"
            # Native mode (global.json test.runner): MTP args go directly after build args
            mtp_sep: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore LibrariesOnly.slnf

      - name: Build
        run: dotnet build LibrariesOnly.slnf --no-restore --configuration Release --framework ${{ matrix.tfm }}

      # Samples target net10.0 only; restore+build the full solution here so the
      # filter (LibrariesOnly.slnf) stays clean of sample project paths.
      - name: Build samples (net10.0 only)
        if: matrix.tfm == 'net10.0'
        run: dotnet restore OpinionatedEventing.slnx && dotnet build OpinionatedEventing.slnx --no-restore --configuration Release

      # dotnet test naturally skips non-test projects, so the full solution is safe
      # here — samples are excluded automatically without needing the filter.
      - name: Unit & BDD tests (no containers)
        run: >
          dotnet test --framework ${{ matrix.tfm }} ${{ matrix.mtp_sep }}
          --filter-not-trait "Category=Integration"
          --report-trx --results-directory ./TestResults
          ${{ matrix.tfm == 'net10.0' && '--coverage --coverage-output-format cobertura' || '' }}

      # Integration tests run on net10.0 only to avoid Docker container name conflicts
      # that occur when all three TFM legs run Testcontainers concurrently on the same runner.
      - name: Integration tests (Testcontainers — Docker required, .NET 10 only)
        if: github.event_name == 'push' && matrix.tfm == 'net10.0'
        timeout-minutes: 20
        run: >
          dotnet test --framework ${{ matrix.tfm }}
          --filter-trait "Category=Integration"
          --ignore-exit-code 8
          --report-trx --results-directory ./TestResults
          --coverage --coverage-output-format cobertura

      - name: Find coverage reports
        if: matrix.tfm == 'net10.0'
        id: cov
        run: |
          FILES=$(find ./TestResults -name '*.cobertura.xml' | tr '\n' ',')
          echo "files=${FILES%,}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        if: matrix.tfm == 'net10.0' && steps.cov.outputs.files != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.cov.outputs.files }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-dotnet-${{ matrix.dotnet }}
          path: ./TestResults/**/*.trx

      # Pack on net10.0 only — one set of .nupkg files is sufficient.
      # NuGet push is intentionally omitted until the library reaches a stable release.
      - name: Pack NuGet packages
        if: success() && matrix.tfm == 'net10.0'
        run: dotnet pack LibrariesOnly.slnf --configuration Release --output ./artifacts/nuget

      - name: Upload NuGet packages
        if: success() && matrix.tfm == 'net10.0'
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/nuget/*.nupkg
