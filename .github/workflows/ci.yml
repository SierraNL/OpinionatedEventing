name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet: [ "8.0.x", "9.0.x", "10.0.x" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit & BDD tests (no containers)
        run: >
          dotnet test -- --filter-trait "Category!=Integration"
          --report-trx
          --coverage --coverage-output-format cobertura

      - name: Integration tests (Testcontainers — Docker required)
        if: github.event_name == 'push'
        run: >
          dotnet test -- --filter-trait "Category=Integration"
          --report-trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dotnet-${{ matrix.dotnet }}
          path: "**/*.trx"
